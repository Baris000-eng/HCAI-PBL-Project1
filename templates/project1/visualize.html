{% extends 'base.html' %}
{% block content %}
<div class="box" style="padding: 20px;">
    <h2>Data Visualization</h2>
    
    <div style="position: relative; height:40vh; width:80vw; margin: auto;">
        <canvas id="myChart"></canvas>
    </div>

    <div style="margin: 20px; display: flex; gap: 20px; justify-content: center;">
        <div>
            <label><strong>X Axis:</strong></label>
            <select id="xColumn" onchange="drawChart()">
                {% for col in columns %}
                    <option value="{{ forloop.counter0 }}">{{ col }}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label><strong>Y Axis:</strong></label>
            <select id="yColumn" onchange="drawChart()">
                {% for col in columns %}
                    <option value="{{ forloop.counter0 }}" {% if forloop.counter == 2 %}selected{% endif %}>{{ col }}</option>
                {% endfor %}
            </select>
        </div>
    </div>

    <hr>
    <div style="text-align: center; font-weight: bold">
        <form action="{% url 'project1:train' %}" method="GET">
            <button type="submit" class="button">Proceed to Machine Learning Model Training</button>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    let myChart; 
    const rawData = JSON.parse('{{ full_data|safe }}');

    function drawChart() {
        const xCol = document.getElementById('xColumn').value;
        const yCol = document.getElementById('yColumn').value;
        const xLabel = document.getElementById('xColumn').options[document.getElementById('xColumn').selectedIndex].text;
        const yLabel = document.getElementById('yColumn').options[document.getElementById('yColumn').selectedIndex].text;

        const formattedData = rawData.map(d => ({ x: d[xCol], y: d[yCol] }));

        if (myChart) myChart.destroy(); 

        myChart = new Chart(document.getElementById('myChart'), {
            type: 'scatter',
            data: {
                datasets: [{ label: `${xLabel} vs ${yLabel}`, data: formattedData, backgroundColor: '#275CB2' }]
            }
        });
    }
    document.addEventListener('DOMContentLoaded', drawChart);
</script>
{% endblock %}
